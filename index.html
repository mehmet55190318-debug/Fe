 <!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fe Chat</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-app.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-database.min.js"></script>

<style>
body{
margin:0;
font-family:system-ui;
background:#0b0b0f;
color:white;
height:100vh;
overflow:hidden;
}

#login{
position:fixed;inset:0;
display:flex;
align-items:center;
justify-content:center;
}

.card{
width:300px;
background:#151522;
padding:20px;
border-radius:12px;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:8px;
border:none;
background:#222;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#6c2cff;
color:white;
font-weight:bold;
cursor:pointer;
}

#chat{
display:none;
flex-direction:column;
height:100vh;
}

.header{
padding:12px;
border-bottom:1px solid #333;
display:flex;
justify-content:space-between;
}

.msgs{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:6px;
}

.msg{
padding:10px;
border-radius:10px;
max-width:70%;
word-wrap:break-word;
}

.me{align-self:flex-end;background:#6c2cff;}
.other{align-self:flex-start;background:#333;}

.input{
display:flex;
padding:10px;
gap:8px;
}

.input input{
flex:1;
margin:0;
border-radius:20px;
}

.input button{
width:auto;
border-radius:20px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="card">
<h3 style="text-align:center">Fe Chat</h3>
<input id="u" placeholder="kullanıcı adı">
<input id="p" type="password" placeholder="şifre">
<button onclick="login()">Giriş</button>
</div>
</div>

<!-- CHAT -->
<div id="chat">

<div class="header">
<div id="title">Chat</div>
<button onclick="logout()" style="background:none;color:red;border:none">Çıkış</button>
</div>

<div class="msgs" id="msgs"></div>

<div class="input">
<input id="m" placeholder="mesaj..." onkeydown="if(event.key==='Enter')send()">
<button onclick="send()">Gönder</button>
</div>

</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyATj-nOLwEBCvXu5B9hsZvLh6TS5pLQz2s",
  authDomain: "apff-a68eb.firebaseapp.com",
  databaseURL: "https://apff-a68eb-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "apff-a68eb"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const ref = db.ref("chat");

let user="";

/* LOGIN */
function login(){
const u=document.getElementById("u").value.trim().toLowerCase();
const p=document.getElementById("p").value.trim();

if((u==="mehmet"||u==="fatmanur") && p==="1234"){
user=u;
document.getElementById("login").style.display="none";
document.getElementById("chat").style.display="flex";

listen();
}else{
alert("hatalı giriş");
}
}

function logout(){
location.reload();
}

/* SEND */
function send(){
const inp=document.getElementById("m");
const text=inp.value.trim();
if(!text) return;

ref.push({
user:user,
text:text,
time:Date.now()
});

inp.value="";
}

/* LISTEN */
function listen(){
const box=document.getElementById("msgs");
box.innerHTML="";

ref.off();

ref.on("child_added",snap=>{
const m=snap.val();

const div=document.createElement("div");
div.className="msg "+(m.user===user?"me":"other");
div.innerText=m.text;

box.appendChild(div);
box.scrollTop=box.scrollHeight;
});
}

</script>

</body>
</html>
