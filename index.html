<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoChat</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-app.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-database.min.js"></script>

<style>
body{
margin:0;
font-family:system-ui;
background:linear-gradient(180deg,#12001f,#000);
color:#fff;
height:100vh;
overflow:hidden;
}

#login{
position:fixed;inset:0;
display:flex;justify-content:center;align-items:center;
}

.card{
width:320px;
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:16px;
backdrop-filter: blur(10px);
}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
background:#111;
color:#fff;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#7a00ff,#ff00aa);
color:#fff;
font-weight:600;
}

#chat{
display:none;
flex-direction:column;
height:100vh;
}

.header{
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #222;
}

.avatar{
width:40px;height:40px;
border-radius:50%;
display:flex;align-items:center;justify-content:center;
background:linear-gradient(45deg,#00f5ff,#7a00ff);
}

.msgs{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

.msg{
max-width:75%;
padding:10px 14px;
border-radius:16px;
word-wrap:break-word;
}

.me{
align-self:flex-end;
background:linear-gradient(45deg,#7a00ff,#ff00aa);
}

.other{
align-self:flex-start;
background:#222;
}

.input{
display:flex;
padding:10px;
border-top:1px solid #222;
}

.input input{
flex:1;
border-radius:20px;
padding:10px;
border:none;
background:#111;
color:#fff;
}

.input button{
width:auto;
margin-left:8px;
border-radius:20px;
}
</style>
</head>

<body>

<div id="login">
  <div class="card">
    <h2 style="text-align:center">NeoChat</h2>
    <input id="u" placeholder="kullanıcı">
    <input id="p" type="password" placeholder="şifre">
    <button onclick="login()">Giriş</button>
  </div>
</div>

<div id="chat">

<div class="header">
  <div style="display:flex;gap:10px;align-items:center">
    <div class="avatar" id="av">N</div>
    <div id="title">Chat</div>
  </div>
  <button onclick="logout()" style="background:none;color:#ff4d4d;border:none">Çıkış</button>
</div>

<div class="msgs" id="msgs"></div>

<div class="input">
  <input id="m" placeholder="mesaj..." onkeydown="if(event.key==='Enter')send()">
  <button onclick="send()">Gönder</button>
</div>

</div>

<script>

/* 🔥 SENİN FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyATj-nOLwEBCvXu5B9hsZvLh6TS5pLQz2s",
  authDomain: "apff-a68eb.firebaseapp.com",
  databaseURL: "https://apff-a68eb-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "apff-a68eb"
};

if (!firebase.apps || !firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();
const ref = db.ref("chat");

let user="";

/* LOGIN */
function login(){
const u=document.getElementById("u").value.trim().toLowerCase();
const p=document.getElementById("p").value.trim();

if((u==="mehmet"||u==="fatmanur") && p==="1234"){
user=u;

document.getElementById("login").style.display="none";
document.getElementById("chat").style.display="flex";

document.getElementById("av").innerText=u[0].toUpperCase();
document.getElementById("title").innerText=
u==="mehmet"?"fatmanur":"mehmet";

listen();
}else{
alert("hatalı giriş");
}
}

function logout(){location.reload();}

/* LISTEN */
function listen(){
const box=document.getElementById("msgs");
box.innerHTML="";

ref.off();
ref.on("child_added",snap=>{
const m=snap.val();

const div=document.createElement("div");
div.className="msg "+(m.user===user?"me":"other");
div.innerText=m.text;

box.appendChild(div);
box.scrollTop=box.scrollHeight;
});
}

/* SEND */
function send(){
const inp=document.getElementById("m");
const text=inp.value.trim();
if(!text) return;

ref.push({
user:user,
text:text,
time:Date.now()
});

inp.value="";
}
</script>

</body>
</html>
